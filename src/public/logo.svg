<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="pin" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#51E8CE"/>
      <stop offset="100%" stop-color="#1E7D72"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Pin body -->
  <path d="M256 466 C292 388 404 306 404 196 A148 148 0 0 0 108 196 C108 306 220 388 256 466Z" fill="url(#pin)"/>

  <!-- Inner dark circle (matches app dark theme) -->
  <circle cx="256" cy="196" r="100" fill="#0A1628"/>

  <!-- Globe latitude lines -->
  <ellipse cx="256" cy="196" rx="100" ry="36" fill="none" stroke="white" stroke-width="1.5" opacity="0.12"/>
  <ellipse cx="256" cy="196" rx="100" ry="70" fill="none" stroke="white" stroke-width="1.5" opacity="0.08"/>
  <!-- Globe longitude -->
  <ellipse cx="256" cy="196" rx="36" ry="100" fill="none" stroke="white" stroke-width="1.5" opacity="0.12"/>
  <!-- Equator -->
  <line x1="156" y1="196" x2="356" y2="196" stroke="white" stroke-width="1.5" opacity="0.08"/>

  <!-- Orange glow -->
  <circle cx="256" cy="196" r="50" fill="url(#glow)"/>

  <!-- Pulse ring -->
  <circle cx="256" cy="196" r="34" fill="none" stroke="#F97316" stroke-width="2" opacity="0.3"/>

  <!-- Center city marker -->
  <circle cx="256" cy="196" r="16" fill="#F97316"/>
  <circle cx="256" cy="196" r="6" fill="white"/>
</svg>
