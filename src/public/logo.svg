<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Pin body - teal -->
  <path d="M256 466 C292 388 404 306 404 196 A148 148 0 0 0 108 196 C108 306 220 388 256 466Z" fill="#2A9D8F"/>
  <!-- Pin highlight edge -->
  <path d="M256 466 C292 388 404 306 404 196 A148 148 0 0 0 256 48 L256 466Z" fill="#238577" opacity="0.5"/>

  <!-- White inner circle -->
  <circle cx="256" cy="196" r="104" fill="#FFFFFF"/>
  <!-- Subtle inner ring -->
  <circle cx="256" cy="196" r="104" fill="none" stroke="#E8F5F3" stroke-width="6"/>

  <!-- Compass needle - North (orange) right half -->
  <polygon points="256,104 282,196 256,196" fill="#F97316"/>
  <!-- Compass needle - North (orange) left half - darker -->
  <polygon points="256,104 230,196 256,196" fill="#EA580C"/>

  <!-- Compass needle - South (navy) right half -->
  <polygon points="256,288 282,196 256,196" fill="#1E3A5F"/>
  <!-- Compass needle - South (navy) left half - darker -->
  <polygon points="256,288 230,196 256,196" fill="#153050"/>

  <!-- East/West subtle tick marks -->
  <line x1="340" y1="196" x2="352" y2="196" stroke="#D1D5DB" stroke-width="4" stroke-linecap="round"/>
  <line x1="160" y1="196" x2="172" y2="196" stroke="#D1D5DB" stroke-width="4" stroke-linecap="round"/>

  <!-- Center pivot -->
  <circle cx="256" cy="196" r="10" fill="#FFFFFF" stroke="#2A9D8F" stroke-width="3"/>
</svg>
